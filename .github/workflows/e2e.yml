name: E2E

# Smoke on PRs (fast gate); full, sharded regression on pushes to main.
# Playwright's webServer config starts the API (:3333) + web (:4200) itself,
# so there's no separate "start servers" step.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

defaults:
  run:
    working-directory: packages/e2e

jobs:
  smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
        working-directory: .
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
      - name: Run @smoke tests
        run: npx playwright test --grep @smoke
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: smoke-report
          path: |
            packages/e2e/playwright-report
            packages/e2e/test-output
          retention-days: 7

  regression:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
        working-directory: .
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
      - name: Run @regression tests (sharded)
        run: npx playwright test --grep @regression --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: packages/e2e/blob-report
          retention-days: 1
      - name: Upload Allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shardIndex }}
          path: packages/e2e/allure-results
          retention-days: 1

  merge-reports:
    # Merge the sharded blob reports into a single HTML report.
    if: ${{ !cancelled() && github.event_name == 'push' }}
    needs: [regression]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
        working-directory: .
      - name: Download blob reports
        uses: actions/download-artifact@v5
        with:
          path: packages/e2e/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - name: Merge into HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: packages/e2e/playwright-report
          retention-days: 14

  allure-report:
    # Build the Allure 3 "Quality Engineering" report from all shards and
    # publish it to GitHub Pages, accumulating UNBOUNDED history in a single
    # history.jsonl that lives on the gh-pages branch (restored before generate,
    # republished with the report). No 20-report cap (that was Allure 2).
    if: ${{ !cancelled() && github.event_name == 'push' }}
    needs: [regression]
    runs-on: ubuntu-latest
    permissions:
      contents: write # peaceiris pushes the report to gh-pages
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
        working-directory: .
      - name: Download Allure results from all shards
        uses: actions/download-artifact@v5
        with:
          path: packages/e2e/allure-results
          pattern: allure-results-*
          merge-multiple: true
      - name: Restore history from gh-pages
        uses: actions/checkout@v5
        continue-on-error: true # first run: branch may not exist yet
        with:
          ref: gh-pages
          path: gh-pages
      - name: Seed history.jsonl
        working-directory: .
        run: cp gh-pages/history.jsonl packages/e2e/history.jsonl || true
      - name: Generate Allure 3 report
        working-directory: .
        run: npm run allure:generate --workspace=@org/e2e
      - name: Preserve history inside the published report
        working-directory: .
        run: cp packages/e2e/history.jsonl packages/e2e/allure-report/history.jsonl || true
      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: packages/e2e/allure-report
